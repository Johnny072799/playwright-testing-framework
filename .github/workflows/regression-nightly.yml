# Full regression suite on a schedule (nightly).
# Runs all @regression scenarios.
#
# Setup: Add repo secrets: BASE_URL, TEST_USERNAME, TEST_PASSWORD
# Schedule: 08:00 SAST (South Africa) = 06:00 UTC. Adjust cron if needed.

name: Regression (Nightly)

on:
  schedule:
    # 06:00 UTC = 08:00 SAST
    - cron: "0 7 * * *"
  workflow_dispatch:
    # Allow manual trigger from Actions tab

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run regression tests
        run: npm run test -- -p regression
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USERNAME: ${{ secrets.TEST_USERNAME }}
          USER_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          HEADLESS: "true"
          PARALLEL: "2"

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-artifacts
          path: |
            artifacts/screenshots/
            artifacts/traces/
          if-no-files-found: ignore
